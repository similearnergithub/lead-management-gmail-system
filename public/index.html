<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Capture | Professional Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #ffffff;
        }

        .container {
            background: #1a1a1a;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1);
            padding: 50px;
            max-width: 650px;
            width: 100%;
            border: 1px solid #2a2a2a;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 70px;
            height: 70px;
            background: #ffffff;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
        }

        .logo svg {
            width: 40px;
            height: 40px;
            fill: #0a0a0a;
        }

        h1 {
            color: #ffffff;
            font-size: 2.2em;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #a0a0a0;
            font-size: 1.05em;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #e0e0e0;
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        label span {
            color: #ff4444;
            margin-left: 2px;
        }

        label .optional {
            color: #888888;
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
            font-size: 0.85em;
        }

        input,
        textarea {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #333333;
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.3s ease;
            font-family: inherit;
            background: #0a0a0a;
            color: #ffffff;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #ffffff;
            background: #1a1a1a;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1);
        }

        input::placeholder,
        textarea::placeholder {
            color: #666666;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            line-height: 1.6;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 600px) {
            .row {
                grid-template-columns: 1fr;
            }
        }

        button {
            width: 100%;
            padding: 16px;
            background: #ffffff;
            color: #0a0a0a;
            border: none;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
        }

        button:hover {
            background: #e0e0e0;
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.3);
        }

        button:active {
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            text-align: center;
            font-weight: 500;
            display: none;
        }

        .message.success {
            background: #1a2e1a;
            color: #4ade80;
            border: 1px solid #2a4a2a;
            display: block;
        }

        .message.error {
            background: #2e1a1a;
            color: #f87171;
            border: 1px solid #4a2a2a;
            display: block;
        }

        .dashboard-link {
            text-align: center;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid #2a2a2a;
        }

        .dashboard-link a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            background: #1a1a1a;
            border: 1px solid #333333;
        }

        .dashboard-link a:hover {
            background: #2a2a2a;
            transform: translateX(5px);
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #0a0a0a;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 35px 25px;
            }

            h1 {
                font-size: 1.7em;
            }

            .subtitle {
                font-size: 0.95em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
            </div>
            <h1>Get In Touch</h1>
            <p class="subtitle">Fill out the form below and we'll get back to you shortly</p>
        </div>

        <div id="message" class="message"></div>

        <form id="leadForm">
            <div class="row">
                <div class="form-group">
                    <label for="fullName">Full Name <span>*</span></label>
                    <input
                        type="text"
                        id="fullName"
                        name="fullName"
                        required
                        placeholder="John Doe"
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email Address <span>*</span></label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        placeholder="john@example.com"
                    >
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input
                        type="tel"
                        id="phone"
                        name="phone"
                        placeholder="+1 (555) 000-0000"
                    >
                </div>

                <div class="form-group">
                    <label for="company">Company <span class="optional">(Optional)</span></label>
                    <input
                        type="text"
                        id="company"
                        name="company"
                        placeholder="Your Company"
                    >
                </div>
            </div>

            <div class="form-group">
                <label for="requirement">How can we help you? <span>*</span></label>
                <textarea
                    id="requirement"
                    name="requirement"
                    required
                    placeholder="Tell us about your project, requirements, or any questions you have..."
                ></textarea>
            </div>

            <button type="submit" id="submitBtn">
                <span id="btnText">Send Message</span>
            </button>
        </form>

        <div class="dashboard-link">
            <a href="/dashboard">View Analytics Dashboard →</a>
        </div>
    </div>

    <script>
        document.getElementById('leadForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const messageDiv = document.getElementById('message');

            const formData = {
                fullName: document.getElementById('fullName').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                company: document.getElementById('company').value.trim(),
                requirement: document.getElementById('requirement').value.trim()
            };

            if (!formData.fullName || !formData.email || !formData.requirement) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Please fill in all required fields';
                return;
            }

            submitBtn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span>Sending...';
            messageDiv.className = 'message';
            messageDiv.style.display = 'none';

            try {
                const response = await fetch('/api/submit-lead', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    messageDiv.className = 'message success';
                    messageDiv.innerHTML = '✓ ' + (result.message || 'Message sent successfully! Check your email.');
                    document.getElementById('leadForm').reset();

                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 2500);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = result.error || 'Failed to send message. Please try again.';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'An error occurred. Please try again.';
                console.error('Error:', error);
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'Send Message';
            }
        });
    </script>
</body>
</html>
