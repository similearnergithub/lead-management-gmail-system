<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .stat-card .icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .stat-card .label {
            color: #666;
            font-size: 0.95em;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .stat-card .value {
            color: #333;
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-card .percentage {
            color: #667eea;
            font-size: 1.1em;
            font-weight: 600;
        }

        .stat-card.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .stat-card.primary .label,
        .stat-card.primary .value {
            color: white;
        }

        .stat-card.success {
            border-left: 5px solid #28a745;
        }

        .stat-card.info {
            border-left: 5px solid #17a2b8;
        }

        .stat-card.warning {
            border-left: 5px solid #ffc107;
        }

        .stat-card.danger {
            border-left: 5px solid #dc3545;
        }

        .section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .leads-table {
            width: 100%;
            border-collapse: collapse;
        }

        .leads-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        .leads-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .leads-table tr:hover {
            background: #f8f9fa;
        }

        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .badge-success {
            background: #d4edda;
            color: #155724;
        }

        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }

        .badge-info {
            background: #d1ecf1;
            color: #0c5460;
        }

        .badge-secondary {
            background: #e2e3e5;
            color: #383d41;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 1.2em;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .leads-table {
                font-size: 0.9em;
            }

            .leads-table th,
            .leads-table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Analytics Dashboard</h1>
            <p>Track your leads and email engagement metrics</p>
        </div>

        <!-- Statistics Cards -->
        <div class="stats-grid">
            <div class="stat-card primary">
                <div class="icon">👥</div>
                <div class="label">Total Leads</div>
                <div class="value" id="totalLeads">0</div>
            </div>

            <div class="stat-card info">
                <div class="icon">📧</div>
                <div class="label">Emails Sent</div>
                <div class="value" id="totalEmailsSent">0</div>
            </div>

            <div class="stat-card success">
                <div class="icon">📬</div>
                <div class="label">Emails Opened</div>
                <div class="value" id="totalEmailsOpened">0</div>
                <div class="percentage" id="openRate">0% Open Rate</div>
            </div>

            <div class="stat-card warning">
                <div class="icon">🔗</div>
                <div class="label">Links Clicked</div>
                <div class="value" id="totalLinkClicks">0</div>
                <div class="percentage" id="clickRate">0% Click Rate</div>
            </div>
        </div>

        <!-- Recent Leads Section -->
        <div class="section">
            <h2>Recent Leads</h2>
            <div id="leadsContainer">
                <div class="loading">Loading leads...</div>
            </div>
        </div>

        <div class="actions">
            <a href="/" class="btn btn-primary">← Back to Form</a>
            <button onclick="refreshData()" class="btn btn-secondary">🔄 Refresh Data</button>
        </div>
    </div>

    <script>
        // Fetch analytics data
        async function fetchAnalytics() {
            try {
                const response = await fetch('/api/analytics');
                const data = await response.json();

                // Update statistics
                document.getElementById('totalLeads').textContent = data.totalLeads;
                document.getElementById('totalEmailsSent').textContent = data.totalEmailsSent;
                document.getElementById('totalEmailsOpened').textContent = data.totalEmailsOpened;
                document.getElementById('openRate').textContent = `${data.openRate}% Open Rate`;
                document.getElementById('totalLinkClicks').textContent = data.totalLinkClicks;
                document.getElementById('clickRate').textContent = `${data.clickRate}% Click Rate`;
            } catch (error) {
                console.error('Error fetching analytics:', error);
            }
        }

        // Fetch leads data
        async function fetchLeads() {
            try {
                const response = await fetch('/api/leads');
                const leads = await response.json();
                displayLeads(leads);
            } catch (error) {
                console.error('Error fetching leads:', error);
                document.getElementById('leadsContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <p>Failed to load leads. Please try again.</p>
                    </div>
                `;
            }
        }

        // Display leads in table
        function displayLeads(leads) {
            const container = document.getElementById('leadsContainer');

            if (leads.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>No leads yet. Submit the form to get started!</p>
                    </div>
                `;
                return;
            }

            const tableHTML = `
                <div style="overflow-x: auto;">
                    <table class="leads-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Company</th>
                                <th>Requirement</th>
                                <th>Submitted</th>
                                <th>Email Status</th>
                                <th>Engagement</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${leads.map(lead => `
                                <tr>
                                    <td>#${lead.id}</td>
                                    <td><strong>${escapeHtml(lead.full_name)}</strong></td>
                                    <td>${escapeHtml(lead.email)}</td>
                                    <td>${lead.phone ? escapeHtml(lead.phone) : '-'}</td>
                                    <td>${lead.company ? escapeHtml(lead.company) : '-'}</td>
                                    <td>${escapeHtml(lead.requirement.substring(0, 50))}${lead.requirement.length > 50 ? '...' : ''}</td>
                                    <td>${formatDate(lead.submission_time)}</td>
                                    <td>
                                        ${lead.email_sent 
                                            ? '<span class="badge badge-success">✓ Sent</span>' 
                                            : '<span class="badge badge-warning">⏳ Pending</span>'
                                        }
                                    </td>
                                    <td>
                                        ${getEngagementBadge(lead)}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;

            container.innerHTML = tableHTML;
        }

        // Get engagement badge
        function getEngagementBadge(lead) {
            const badges = [];
            
            if (lead.email_opened) {
                badges.push('<span class="badge badge-info">📬 Opened</span>');
            }
            
            if (lead.link_clicked) {
                badges.push('<span class="badge badge-success">🔗 Clicked</span>');
            }

            if (badges.length === 0) {
                return '<span class="badge badge-secondary">No engagement</span>';
            }

            return badges.join(' ');
        }

        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return 'Just now';
            if (minutes < 60) return `${minutes}m ago`;
            if (hours < 24) return `${hours}h ago`;
            if (days < 7) return `${days}d ago`;
            
            return date.toLocaleDateString();
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Refresh all data
        function refreshData() {
            fetchAnalytics();
            fetchLeads();
        }

        // Auto-refresh every 30 seconds
        setInterval(refreshData, 30000);

        // Initial load
        refreshData();
    </script>
</body>
</html>
